name: NLP avis (silver)

# Étape d'analyse textuelle des avis ville-ideale, tenue HORS de l'image
# duckpipe (deps lourdes : spaCy + torch + transformers, cf. ADR-0013 et le
# plan avis-sentiment). Produit les trois Parquet silver avis sur GCS ; le DAG
# duckpipe (étape avis_gold) les agrège ensuite en gold à chaque run annuel.
#
# Déclenché à la main, ou automatiquement quand le CSV d'avis scrapés change
# (le scraping lui-même reste manuel : anti-bot, IP résidentielle requise).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ville_ideale/data/avis_*.csv"
      - "ville_ideale/homepedia_ville_ideale/nlp/**"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-aab739fb-fb38-4996-84e
  WORKLOAD_IDENTITY_PROVIDER: projects/305656045089/locations/global/workloadIdentityPools/github/providers/github-oidc
  DEPLOYER_SA: github-deployer@project-aab739fb-fb38-4996-84e.iam.gserviceaccount.com
  DATA_BUCKET: gs://homepedia-data
  AVIS_CSV: ville_ideale/data/avis_top80.csv

jobs:
  nlp-avis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ville_ideale
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ville_ideale/uv.lock

      # Le poids de DistilCamemBERT (~250 Mo) est mis en cache entre runs.
      - name: Cache Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-distilcamembert-sentiment-v1

      - name: Install NLP + GCS deps
        run: uv sync --extra nlp --extra gcs

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Build silver avis (bronze copy + 3 Parquet) et upload GCS
        run: |
          uv run python -m homepedia_ville_ideale.nlp build \
            --csv data/avis_top80.csv \
            --silver-root "${DATA_BUCKET}/silver" \
            --bronze-copy "${DATA_BUCKET}/bronze/ville_ideale/avis_top80.csv"

      - name: Calibration (rapport dans le job summary)
        run: |
          {
            echo '### Calibration sentiment vs note'
            echo '```json'
            uv run python -m homepedia_ville_ideale.nlp calibrate --csv data/avis_top80.csv
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
