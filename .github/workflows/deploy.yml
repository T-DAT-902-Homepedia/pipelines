name: Deploy duckpipe

# CD : build de l'image, mise à jour du Cloud Run Job et redéploiement du DAG
# Workflows, à chaque merge sur main touchant duckpipe/. Authentification par
# Workload Identity Federation, sans clé statique (cf. ADR-0012 et le script
# duckpipe/deploy/setup-github-wif.sh à exécuter une fois).

on:
  push:
    branches: [main]
    paths: ["duckpipe/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-aab739fb-fb38-4996-84e
  REGION: europe-west1
  IMAGE: europe-west1-docker.pkg.dev/project-aab739fb-fb38-4996-84e/homepedia/duckpipe
  WORKLOAD_IDENTITY_PROVIDER: projects/305656045089/locations/global/workloadIdentityPools/github/providers/github-oidc
  DEPLOYER_SA: github-deployer@project-aab739fb-fb38-4996-84e.iam.gserviceaccount.com
  RUNNER_SA: pipeline-runner@project-aab739fb-fb38-4996-84e.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t "$IMAGE:${GITHUB_SHA}" duckpipe
          docker push "$IMAGE:${GITHUB_SHA}"

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update duckpipe \
            --image "$IMAGE:${GITHUB_SHA}" \
            --region "$REGION" --project "$PROJECT_ID"

      - name: Deploy Workflows DAG
        run: |
          gcloud workflows deploy homepedia-pipeline \
            --location "$REGION" --project "$PROJECT_ID" \
            --source duckpipe/deploy/homepedia-pipeline.yaml \
            --service-account "$RUNNER_SA"
