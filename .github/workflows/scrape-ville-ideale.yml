name: Scrape ville-ideale.fr

on:
  workflow_dispatch:
    inputs:
      max_reviews:
        description: "Nombre max d'avis par ville"
        default: "10"
        required: false

jobs:
  # ── Scraping parallèle (20 IPs Azure différentes) ─────────────────────────
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { batch: 0,  start: 0,     end: 1961  }
          - { batch: 1,  start: 1961,  end: 3922  }
          - { batch: 2,  start: 3922,  end: 5883  }
          - { batch: 3,  start: 5883,  end: 7844  }
          - { batch: 4,  start: 7844,  end: 9805  }
          - { batch: 5,  start: 9805,  end: 11766 }
          - { batch: 6,  start: 11766, end: 13727 }
          - { batch: 7,  start: 13727, end: 15688 }
          - { batch: 8,  start: 15688, end: 17649 }
          - { batch: 9,  start: 17649, end: 19610 }
          - { batch: 10, start: 19610, end: 21571 }
          - { batch: 11, start: 21571, end: 23532 }
          - { batch: 12, start: 23532, end: 25493 }
          - { batch: 13, start: 25493, end: 27454 }
          - { batch: 14, start: 27454, end: 29415 }
          - { batch: 15, start: 29415, end: 31376 }
          - { batch: 16, start: 31376, end: 33337 }
          - { batch: 17, start: 33337, end: 35298 }
          - { batch: 18, start: 35298, end: 37259 }
          - { batch: 19, start: 37259, end: 39201 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install httpx beautifulsoup4 lxml

      - name: Télécharger le CSV des communes
        run: |
          curl -sL "https://www.data.gouv.fr/fr/datasets/r/554590ab-ae62-40ac-8353-ee75162c05ee" \
            -o /tmp/communes.csv
          echo "Lignes : $(wc -l < /tmp/communes.csv)"

      - name: Scraper le batch ${{ matrix.batch }}
        env:
          MAX_REVIEWS: ${{ github.event.inputs.max_reviews || '10' }}
          DELAY_MIN: "2.0"
          DELAY_MAX: "5.0"
        run: |
          python ville_ideale/scripts/scrape_ville_ideale.py \
            --communes /tmp/communes.csv \
            --start ${{ matrix.start }} \
            --end ${{ matrix.end }} \
            --output /tmp/batch_${{ matrix.batch }}.csv

      - name: Upload batch ${{ matrix.batch }}
        uses: actions/upload-artifact@v4
        with:
          name: batch-${{ matrix.batch }}
          path: /tmp/batch_${{ matrix.batch }}.csv
          retention-days: 7

  # ── Merge de tous les CSV ──────────────────────────────────────────────────
  merge:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger tous les artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          path: /tmp/batches/
          merge-multiple: true

      - name: Merger en un seul CSV
        run: |
          python - <<'EOF'
          import csv, pathlib

          batches = sorted(pathlib.Path("/tmp/batches").glob("batch_*.csv"))
          print(f"Merge de {len(batches)} batches")

          out = pathlib.Path("avis_ville_ideale.csv")
          writer = None
          total = 0

          with open(out, "w", newline="", encoding="utf-8") as fout:
              for f in batches:
                  with open(f, encoding="utf-8") as fin:
                      reader = csv.DictReader(fin)
                      if writer is None:
                          writer = csv.DictWriter(fout, fieldnames=reader.fieldnames)
                          writer.writeheader()
                      for row in reader:
                          writer.writerow(row)
                          total += 1

          print(f"Total : {total} avis écrits dans {out}")
          EOF

      - name: Upload CSV final
        uses: actions/upload-artifact@v4
        with:
          name: avis-ville-ideale-final
          path: avis_ville_ideale.csv
          retention-days: 30
