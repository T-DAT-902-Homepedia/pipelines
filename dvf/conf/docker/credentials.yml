# Credentials de l'environnement `docker` (KEDRO_ENV=docker) — COMMITÉ.
# Aucun secret littéral : uniquement des ${oc.env:VAR,defaut}. Les vraies valeurs
# viennent des variables d'environnement du conteneur (compose -> .env.data).
# Les défauts pointent sur localhost : ce fichier reste donc inoffensif hors conteneur.

# MinIO / S3A — injecté dans la SparkSession par DvfHooks.
minio:
  endpoint: ${oc.env:MINIO_ENDPOINT,http://localhost:9000}
  access_key: ${oc.env:MINIO_ROOT_USER,homepedia}
  secret_key: ${oc.env:MINIO_ROOT_PASSWORD,changeme-minio}

# PostGIS — versé dans les properties JDBC (user/password uniquement).
postgis:
  user: ${oc.env:POSTGRES_USER,homepedia}
  password: ${oc.env:POSTGRES_PASSWORD,changeme-postgres}

# PostGIS — DSN psycopg du pipeline geo (node Python pur).
postgis_admin:
  host: ${oc.env:POSTGRES_HOST,localhost}
  port: ${oc.env:POSTGRES_PORT,5432}
  dbname: ${oc.env:POSTGRES_DB,homepedia}
  user: ${oc.env:POSTGRES_USER,homepedia}
  password: ${oc.env:POSTGRES_PASSWORD,changeme-postgres}
